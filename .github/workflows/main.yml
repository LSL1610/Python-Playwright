name: Automation Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v3
        with:
          distribution: 'temurin'
          java-version: '3.11.4'

      - name: Run tests
        run: mvn test
